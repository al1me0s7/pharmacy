{% extends 'base.html' %}
{% block content %}
<div style="max-width:600px;margin:40px auto;padding:20px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
    <h1>Додати товар до інвентарю</h1>
    <a href="{{ url_for('admin_inventory.admin_inventory') }}" class="btn" style="background:#16a34a;color:white;">←</a>
  </div>

  <div style="background:white;border:2px solid #16a34a;border-radius:12px;padding:30px;box-shadow:0 2px 8px rgba(22,163,74,0.1);">
    <form method="post">
      <div style="margin-bottom:20px;">
        <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Аптека *</label>
        <select name="pharmacy_id" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
          <option value="">Оберіть аптеку</option>
          {% for p in pharmacies %}
            <option value="{{ p.pharmacy_id }}">{{ p.pharmacy_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Препарат *</label>
        <select name="medicine_id" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
          <option value="">Оберіть препарат</option>
          {% for m in medicines %}
            <option value="{{ m.medicine_id }}">{{ m.medicine_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Кількість *</label>
        <input type="number" name="quantity" min="0" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
      </div>

      <div style="text-align:center;">
        <button type="submit" style="background:#16a34a;color:white;border:none;padding:12px 30px;border-radius:6px;font-weight:bold;cursor:pointer;">Додати до інвентарю</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
