    <table class="admin-table">
        <thead>
            <tr>
                <th>Назва категорії</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            {% for c in categories %}
            <tr>
                <td><strong>{{ c.category_name }}</strong></td>
                <td>
                    <a href="{{ url_for('admin_categories.admin_categories_edit', cid=c.category_id) }}" class="btn-edit" title="Редагувати">Редагувати</a>
                    <form method="POST" action="{{ url_for('admin_categories.admin_categories_delete', cid=c.category_id) }}" style="display:inline;">
                        <button type="submit" class="btn-delete" onclick="return confirm('Видалити цю категорію?');">Видалити</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="2" style="text-align:center;">Категорії не знайдені</td></tr>
            {% endfor %}
        </tbody>
    </table>
