{% extends 'base.html' %}
{% block content %}
<div style="max-width:600px;margin:40px auto;padding:20px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
    <h1>Додати нову категорію</h1>
    <a href="{{ url_for('admin_categories.admin_categories') }}" class="btn" style="background:#16a34a;color:white;">←</a>
  </div>

  <div style="background:white;border:2px solid #16a34a;border-radius:12px;padding:30px;box-shadow:0 2px 8px rgba(22,163,74,0.1);">
    <form method="post">
      <div style="margin-bottom:20px;">
        <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Назва категорії *</label>
        <input type="text" name="category_name" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
      </div>

      <div style="text-align:center;">
        <button type="submit" style="background:#16a34a;color:white;border:none;padding:12px 30px;border-radius:6px;font-weight:bold;cursor:pointer;">Додати категорію</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
