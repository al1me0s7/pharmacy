{% extends 'base.html' %}
{% block content %}
<div class="admin-container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1 style="margin:0;">Управління користувачами</h1>
    <a href="{{ url_for('admin_dashboard.admin_dashboard') }}" class="btn" style="background:#16a34a;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;border:none;cursor:pointer;">←</a>
  </div>

  <!-- ФІЛЬТРИ -->
  <div style="background:#f9fafb;padding:15px;border-radius:8px;margin-bottom:20px;border:2px solid #16a34a;box-shadow:0 2px 8px rgba(22,163,74,0.1);">
    <form method="get" style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;">
      <div>
        <label style="font-size:12px;font-weight:500;color:#666;">Пошук (ім'я, email, телефон):</label>
        <input type="text" name="search" value="{{ search }}" placeholder="Введіть текст..." style="width:100%;padding:8px;border:1px solid #16a34a;border-radius:4px;font-size:13px;">
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#666;">Сортування:</label>
        <select name="sort" style="width:100%;padding:8px;border:1px solid #16a34a;border-radius:4px;font-size:13px;">
          <option value="recent" {% if sort == 'recent' %}selected{% endif %}>Новіші спочатку</option>
          <option value="name" {% if sort == 'name' %}selected{% endif %}>За ім'ям (А-Я)</option>
          <option value="email" {% if sort == 'email' %}selected{% endif %}>За email</option>
        </select>
      </div>
      <button type="submit" class="btn" style="background:#16a34a;color:white;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Пошук</button>
    </form>
  </div>

  <div id="users-table-container">
  <table class="admin-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Ім'я</th>
        <th>Email</th>
        <th>Телефон</th>
        <th>Місто</th>
        <th>Дії</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.user_id }}</td>
        <td><strong>{{ user.full_name }}</strong></td>
        <td>{{ user.email }}</td>
        <td>{{ user.phone_number or '—' }}</td>
        <td>{{ user.city or '—' }}</td>
        <td>
          <form method="POST" action="{{ url_for('admin_users.admin_user_delete', uid=user.user_id) }}" style="display:inline;">
            <button type="submit" class="btn-delete" onclick="return confirm('Видалити користувача?');">Видалити</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
</div>

<style>
.admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.admin-table thead { background: #16a34a; color: white; }
.admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
.admin-table tbody tr:hover { background: #f9f9f9; }
.btn-delete { background: #ef4444; color: white; padding: 8px 15px; border: none; cursor: pointer; border-radius: 4px; }
.btn-delete:hover { background: #dc2626; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form[method="get"]');
    const searchInput = document.querySelector('input[name="search"]');
    const tableContainer = document.getElementById('users-table-container');
    let debounceTimer = null;

    async function doSearch(){
        const params = new URLSearchParams(new FormData(form));
        const url = '/admin/users/search?' + params.toString();
        try{
            const res = await fetch(url, { headers: { 'Accept': 'text/html' } });
            if(res.ok){
                const html = await res.text();
                if(tableContainer) tableContainer.innerHTML = html;
            }
        }catch(e){ console.warn(e); }
    }

    if (searchInput) {
        searchInput.addEventListener('input', doSearch);
    }
    
    form && form.addEventListener('submit', function(e) {
        e.preventDefault();
        doSearch();
        return false;
    });
    
    form && form.addEventListener('change', function(e){ 
        if(e.target.name === 'search') return; 
        doSearch(); 
    });
});
</script>
{% endblock %}
