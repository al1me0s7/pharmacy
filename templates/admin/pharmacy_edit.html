{% extends 'base.html' %}

{% block content %}

<a href="{{ url_for('admin_pharmacies.admin_pharmacies') }}" class="btn" 
   style="background:#16a34a;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;margin-bottom:20px;display:inline-block;">
← Назад
</a>

<div class="admin-container" style="max-width:800px;margin:auto;margin-top:20px;">
    <div class="form-card" style="background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 20px rgba(22,163,74,0.1);">
        <h2 style="margin-top:0; margin-bottom: 30px; color: #16a34a; text-align: center; font-size: 28px;">Редагування аптеки</h2>

        <form method="POST">
            <div class="form-section">
                <h3 style="color: #16a34a; margin-bottom: 20px; font-size: 18px;">Основна інформація</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="pharmacy_name" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Назва аптеки *</label>
                        <input type="text" id="pharmacy_name" name="pharmacy_name" 
                               value="{{ pharmacy.pharmacy_name }}" required
                               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;">
                    </div>
                    <div class="form-group">
                        <label for="city_id" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Місто *</label>
                        <select id="city_id" name="city_id" required
                                style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; background: white; cursor: pointer; transition: border-color 0.2s;">
                            <option value="">Виберіть місто</option>
                            {% for c in cities %}
                                <option value="{{ c.city_id }}"
                                    {% if c.city_id == pharmacy.city_id %}selected{% endif %}>
                                    {{ c.city_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 style="color: #16a34a; margin-bottom: 20px; font-size: 18px;">Контактна інформація</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="address" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Адреса *</label>
                        <input type="text" id="address" name="address" value="{{ pharmacy.address }}" required
                               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;">
                    </div>
                    <div class="form-group">
                        <label for="working_hours" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Години роботи</label>
                        <input type="text" id="working_hours" name="working_hours" value="{{ pharmacy.working_hours }}"
                               placeholder="Наприклад: 9:00-21:00"
                               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="contact_phone" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Телефон *</label>
                        <input type="tel" id="contact_phone" name="contact_phone" value="{{ pharmacy.contact_phone }}" required
                               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;">
                    </div>
                    <div class="form-group">
                        <label for="email" style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">Email</label>
                        <input type="email" id="email" name="email" value="{{ pharmacy.email }}"
                               placeholder="example@pharmacy.com"
                               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; transition: border-color 0.2s;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3 style="color: #16a34a; margin-bottom: 20px; font-size: 18px;">Послуги</h3>
                
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb;">
                    <label style="display:flex;align-items:flex-start;gap:15px;cursor:pointer;font-size:16px;font-weight:500;">
                        <input type="checkbox" name="has_delivery"
                               style="width:20px;height:20px;margin-top:2px;cursor:pointer;accent-color:#16a34a;border:2px solid #16a34a;border-radius:4px;"
                               {% if pharmacy.has_delivery %}checked{% endif %}>
                        <div style="flex:1;">
                            <span style="color: #16a34a; font-weight: 600;">Доставка доступна</span>
                            <p style="margin: 8px 0 0 0; font-size: 14px; color: #6b7280; line-height: 1.4;">Чи здійснює аптека доставку ліків? Це важливо для клієнтів при виборі способу отримання замовлення.</p>
                        </div>
                    </label>
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <button class="btn-primary" type="submit" 
                        style="background: linear-gradient(135deg, #16a34a, #15803d); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 12px rgba(22,163,74,0.3);">
                    Зберегти зміни
                </button>
            </div>
        </form>
    </div>
</div>

<style>
.admin-container { max-width: 900px; margin: 0 auto; padding: 20px; }
.form-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 20px rgba(22,163,74,0.1); }
.form-section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #e5e7eb; }
.form-section:last-child { border-bottom: none; margin-bottom: 0; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; }
.form-group input:focus, .form-group select:focus { 
    outline: none; 
    border-color: #16a34a; 
    box-shadow: 0 0 0 3px rgba(22,163,74,0.1);
}
.btn-primary:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 6px 16px rgba(22,163,74,0.4); 
}
@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; gap: 15px; }
    .admin-container { padding: 10px; }
    .form-card { padding: 20px; }
}
</style>

{% endblock %}
