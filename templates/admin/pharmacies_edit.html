{% extends 'base.html' %}
{% block content %}
<div style="max-width:800px;margin:40px auto;padding:20px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
    <h1>Редагувати аптеку</h1>
    <a href="{{ url_for('admin_pharmacies.admin_pharmacies') }}" class="btn" style="background:#16a34a;color:white;">←</a>
  </div>

  <div style="background:white;border:2px solid #16a34a;border-radius:12px;padding:30px;box-shadow:0 2px 8px rgba(22,163,74,0.1);">
    <form method="post">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Назва аптеки *</label>
          <input type="text" name="pharmacy_name" value="{{ pharmacy.pharmacy_name }}" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
        </div>

        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Місто *</label>
          <select name="city_id" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
            <option value="">Оберіть місто</option>
            {% for city in cities %}
            <option value="{{ city.city_id }}" {% if city.city_id == pharmacy.city_id %}selected{% endif %}>{{ city.city_name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Адреса *</label>
          <input type="text" name="address" value="{{ pharmacy.address }}" required style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
        </div>

        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Телефон</label>
          <input type="text" name="contact_phone" value="{{ pharmacy.contact_phone }}" style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
        </div>

        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Email</label>
          <input type="email" name="email" value="{{ pharmacy.email }}" style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
        </div>

        <div>
          <label style="display:block;font-weight:bold;color:#16a34a;margin-bottom:8px;">Години роботи</label>
          <input type="text" name="working_hours" value="{{ pharmacy.working_hours }}" placeholder="Напр.: 9:00-21:00" style="width:100%;padding:10px;border:1px solid #e6e9ef;border-radius:6px;">
        </div>
      </div>

      <div style="margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:10px;font-weight:bold;color:#16a34a;">
          <input type="checkbox" name="has_delivery" {% if pharmacy.has_delivery %}checked{% endif %} style="width:18px;height:18px;">
          <span>Доступна доставка</span>
        </label>
      </div>

      <div style="text-align:center;">
        <button type="submit" style="background:#16a34a;color:white;border:none;padding:12px 30px;border-radius:6px;font-weight:bold;cursor:pointer;">Зберегти зміни</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
